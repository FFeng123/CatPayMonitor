name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag version
        id: extract_tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006"

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Restore native module files
        run: |
          mkdir -p android/app/src/main/java/com/anonymous/CatPayMonitor
          git restore android/app/src/main/java/com/anonymous/CatPayMonitor/

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Add signing config
        run: |
          sed -i "s/signingConfigs {/signingConfigs {\n        release {\n            storeFile file('release\/keystore.jks')\n            storePassword 'android'\n            keyAlias 'release'\n            keyPassword 'android'\n        }/" android/app/build.gradle

      - name: Update version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${{ steps.extract_tag.outputs.version }}
          sed -i "s/versionName \"1.0.0\"/versionName \"$VERSION\"/" android/app/build.gradle

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..

      - name: Copy APK
        run: cp android/app/build/outputs/apk/release/app-release.apk release/CatPayMonitor-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatPayMonitor-release.apk
          path: release/CatPayMonitor-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.extract_tag.outputs.tag }}
          name: Release ${{ steps.extract_tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.extract_tag.outputs.tag, 'beta') || contains(steps.extract_tag.outputs.tag, 'alpha') }}
          files: release/CatPayMonitor-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
