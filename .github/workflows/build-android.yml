name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006"

      - name: Generate Android project
        run: npx expo prebuild --platform android

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Create native module directory
        run: |
          mkdir -p android/app/src/main/java/com/anonymous/catpaymonitor

      - name: Create NotificationMonitorService.kt
        run: |
          cat > android/app/src/main/java/com/anonymous/catpaymonitor/NotificationMonitorService.kt << 'EOF'
package com.anonymous.catpaymonitor

import android.app.Notification
import android.service.notification.NotificationListenerService
import android.service.notification.StatusBarNotification
import android.util.Log

class NotificationMonitorService : NotificationListenerService() {
    private val TAG = "NotificationMonitor"
    private val WECHAT_PACKAGE = "com.tencent.mm"
    private val ALIPAY_PACKAGE = "com.eg.android.AlipayGphone"

    override fun onNotificationPosted(sbn: StatusBarNotification?) {
        sbn ?: return
        val packageName = sbn.packageName
        if (packageName != WECHAT_PACKAGE && packageName != ALIPAY_PACKAGE) return
        val notification = sbn.notification
        val extras = notification.extras
        val title = extras.getCharSequence(Notification.EXTRA_TITLE)?.toString() ?: ""
        val text = extras.getCharSequence(Notification.EXTRA_TEXT)?.toString() ?: ""
        if (isPaymentNotification("$title $text")) {
            NotificationMonitorModule.sendNotification(packageName, title, text)
        }
    }

    private fun isPaymentNotification(text: String): Boolean {
        val lowerText = text.lowercase()
        return lowerText.contains("微信支付") || lowerText.contains("收款") ||
               lowerText.contains("到账") || lowerText.contains("支付宝")
    }
    override fun onNotificationRemoved(sbn: StatusBarNotification?) {}
}
EOF

      - name: Create NotificationMonitorModule.kt
        run: |
          cat > android/app/src/main/java/com/anonymous/catpaymonitor/NotificationMonitorModule.kt << 'EOF'
package com.anonymous.catpaymonitor

import android.content.ComponentName
import android.content.Context
import android.content.Intent
import android.content.ServiceConnection
import android.os.IBinder
import com.facebook.react.bridge.*
import com.facebook.react.modules.core.DeviceEventManagerModule

class NotificationMonitorModule(reactContext: ReactApplicationContext) : ReactContextBaseJavaModule(reactContext) {
    private var reactCtx: ReactApplicationContext? = null

    init {
        reactCtx = reactContext
        NotificationMonitorModule.setCallback { pkg, title, txt -> sendEvent(pkg, title, txt) }
    }

    private fun sendEvent(pkg: String, title: String, text: String) {
        val ctx = reactCtx ?: return
        val params = Arguments.createMap().apply {
            putString("packageName", pkg)
            putString("title", title)
            putString("text", text)
        }
        ctx.getJSModule(DeviceEventManagerModule.RCTDeviceEventEmitter::class.java).emit("onNotificationReceived", params)
    }

    override fun getName() = "NotificationMonitorModule"

    @ReactMethod
    fun startListening(promise: Promise) {
        try {
            val ctx = reactApplicationContext
            val intent = Intent(ctx, NotificationMonitorService::class.java)
            ctx.bindService(intent, object : ServiceConnection {
                override fun onServiceConnected(n: ComponentName?, s: IBinder?) {}
                override fun onServiceDisconnected(n: ComponentName?) {}
            }, Context.BIND_AUTO_CREATE)
            ctx.startService(intent)
            promise.resolve(true)
        } catch (e: Exception) {
            promise.reject("ERROR", e.message)
        }
    }

    @ReactMethod fun stopListening(promise: Promise) = promise.resolve(true)
    @ReactMethod fun addListener(s: String) {}
    @ReactMethod fun removeListeners(i: Int) {}

    companion object {
        private var callback: ((String, String, String) -> Unit)? = null
        fun sendNotification(pkg: String, title: String, text: String) = callback?.invoke(pkg, title, text)
        fun setCallback(cb: (String, String, String) -> Unit) { callback = cb }
    }
}
EOF

      - name: Create NotificationMonitorPackage.kt
        run: |
          cat > android/app/src/main/java/com/anonymous/catpaymonitor/NotificationMonitorPackage.kt << 'EOF'
package com.anonymous.catpaymonitor

import com.facebook.react.ReactPackage
import com.facebook.react.bridge.ReactApplicationContext

class NotificationMonitorPackage : ReactPackage {
    override fun createNativeModules(reactContext: ReactApplicationContext) = listOf(NotificationMonitorModule(reactContext))
    override fun createViewManagers(reactContext: ReactApplicationContext) = emptyList()
}
EOF

      - name: Update MainApplication.kt
        run: |
          sed -i 's/import expo.modules.ApplicationLifecycleDispatcher/import expo.modules.ApplicationLifecycleDispatcher\nimport com.anonymous.catpaymonitor.NotificationMonitorPackage/' android/app/src/main/java/com/anonymous/catpaymonitor/MainApplication.kt
          sed -i 's/: add(MyReactNativePackage())/: add(NotificationMonitorPackage())/' android/app/src/main/java/com/anonymous/catpaymonitor/MainApplication.kt

      - name: Update AndroidManifest.xml
        run: |
          sed -i 's|<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE|  <uses-permission android:name="android.permission.BIND_NOTIFICATION_LISTENER_SERVICE"/>\n  <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n  <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE|' android/app/src/main/AndroidManifest.xml
          sed -i 's|</activity>|</activity>\n    <service\n      android:name=".NotificationMonitorService"\n      android:exported="false"\n      android:permission="android.permission.BIND_NOTIFICATION_LISTENER_SERVICE">\n      <intent-filter>\n        <action android:name="android.service.notification.NotificationListenerService"/>\n      </intent-filter>\n    </service>|' android/app/src/main/AndroidManifest.xml

      - name: Create release directory
        run: mkdir -p release

      - name: Create release keystore
        run: |
          keytool -genkeypair -v -storetype PKCS12 -keystore release/keystore.jks -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=CatPay, OU=CatPay, O=CatPay, L=Beijing, ST=Beijing, C=CN"

      - name: Configure signing
        run: |
          echo "android.signingConfigs.release.storeFile=release/keystore.jks" >> android/gradle.properties
          echo "android.signingConfigs.release.storePassword=android" >> android/gradle.properties
          echo "android.signingConfigs.release.keyAlias=release" >> android/gradle.properties
          echo "android.signingConfigs.release.keyPassword=android" >> android/gradle.properties
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' android/app/build.gradle

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..

      - name: Copy APK
        run: cp android/app/build/outputs/apk/release/app-release.apk release/CatPayMonitor-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CatPayMonitor-release.apk
          path: release/CatPayMonitor-release.apk
          retention-days: 30
